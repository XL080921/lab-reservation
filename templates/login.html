{% extends "base.html" %}
{% block title %}管理员登录 - LabReserve{% endblock %}
{% block content %}
<div style="max-width:400px;margin:60px auto">
  <div class="card">
    <div class="card-body" style="padding:32px">
      <h2 style="text-align:center;margin-bottom:24px">🔐 管理员登录</h2>
      <form method="POST">
        <div class="form-group">
          <label class="form-label">管理员密码</label>
          <input type="password" name="password" class="form-control" placeholder="请输入管理员密码" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-2">登录</button>
      </form>
      <p class="text-muted text-center mt-2">默认密码: admin123</p>
    </div>
  </div>
</div>
{% endblock %}
